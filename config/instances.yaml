---
litemaas:
  models:
    - minimax-m2
  duration: 1d
  enable_user_info_messages: true
  enable_user_info_data: true

virtualmachines:
  - name: "satellite"
    image: "satellite-server-rhdp-1-6-19-04-09-26-v2"
    bootloader: efi
    register_satellite: false
    memory: "32G"
    cores: 8
    image_size: "540Gi"
    tags:
      - key: "AnsibleGroup"
        value: "bastions"
    networks:
      - default
    userdata: |
      #cloud-config
      fqdn: satellite.lab
      hostname: satellite
      prefer_fqdn_over_hostname: true
      manage_etc_hosts: true
    services:
      - name: satellite-https
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: satellite-https
